<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신상품 매출 리포트 — Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',-apple-system,sans-serif;background:#F9F8F6;color:#1E2029;padding:36px 24px;min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto}
.page-hd{margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #EFEFEF}
.page-title{font-size:20px;font-weight:700;color:#1E2029;margin-bottom:4px;min-height:28px}
.page-team{font-size:11px;color:#8A8FA3}
#status-bar{font-size:11px;margin-bottom:24px;display:flex;align-items:center;gap:7px;min-height:18px;color:#8A8FA3}
#status-bar.ok{color:#0F6E56}
#status-bar.fail{color:#9B2236}
.dot{width:7px;height:7px;border-radius:50%;background:#D1D5DB;flex-shrink:0}
.dot.ok{background:#0F6E56}
.dot.fail{background:#9B2236}
.dot.spin{background:transparent;border:2px solid #D1D5DB;border-top-color:#1E2029;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
@media(max-width:620px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:#fff;border:1px solid #EFEFEF;border-radius:10px;padding:18px 20px}
.kpi-lbl{font-size:11px;color:#8A8FA3;margin-bottom:8px}
.kpi-val{font-size:22px;font-weight:700;color:#1E2029;min-height:32px}
.kpi-val.purple{color:#534AB7}
.kpi-sub{font-size:10px;color:#8A8FA3;margin-top:4px;min-height:14px}
.sec-card{background:#fff;border:1px solid #EFEFEF;border-radius:12px;padding:24px 28px;margin-bottom:18px}
.sec-hd{margin-bottom:18px}
.sec-hd-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-badge{background:#F5E6E9;color:#9B2236;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:.08em;white-space:nowrap}
.sec-title{font-size:14px;font-weight:700;color:#1E2029}
.sec-line{height:.5px;background:#9B2236}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#8A8FA3;font-weight:500;text-align:right;padding:5px 10px 7px;border-bottom:1px solid #EFEFEF;white-space:nowrap}
th.L{text-align:left}
th.C{text-align:center}
td{font-size:11.5px;padding:8px 10px;text-align:right;color:#1E2029;border-bottom:.5px solid #EFEFEF}
td.L{text-align:left}
tr:last-child td{border-bottom:none}
.row-sub td{color:#8A8FA3;font-size:11px}
.row-sub td.L{text-align:left}
.row-total td{font-weight:700;border-top:1px solid #EFEFEF;border-bottom:none}
.row-total td.L{text-align:left}
.row-hi{background:#FEF7F7}
.hi{color:#9B2236;font-weight:700}
.nm{font-size:11px;color:#8A8FA3;text-align:left;max-width:180px;white-space:normal;word-break:keep-all;line-height:1.5}
.tbl-scroll{overflow-x:auto}
.tbl-scroll table{min-width:900px}
.bl{border-left:1px solid #EFEFEF !important}
.muted{color:#D1D5DB}
.b-off{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#FAECE7;color:#993C1D}
.b-mall{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E1F5EE;color:#0F6E56}
.b-smt{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E6F1FB;color:#185FA5}
.b-kakao{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#FFF9E6;color:#7A5F00}
.b-29cm{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#F4F4F4;color:#222222}
.daily-wrap{display:flex;gap:28px;align-items:flex-start}
.daily-chart-col{flex:1.4}
.daily-tbl-col{flex:1;padding-top:4px}
@media(max-width:768px){.daily-wrap{flex-direction:column}.daily-chart-col,.daily-tbl-col{flex:none;width:100%}}
.chart-box{position:relative;width:100%;height:220px}
.sk{display:inline-block;border-radius:3px;background:linear-gradient(90deg,#EFEFEF 25%,#F9F8F6 50%,#EFEFEF 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.err-box{padding:14px 18px;border-radius:8px;background:#FFF5F5;border:1px solid #F5C6CB;font-size:12px;color:#9B2236;line-height:1.8}
.err-box pre{margin-top:8px;padding:8px 12px;background:#fff;border-radius:4px;font-size:10px;color:#555;white-space:pre-wrap;word-break:break-all}
.footer{margin-top:24px;font-size:10px;color:#C8CBD2;text-align:right}
</style>
</head>
<body>
<div class="wrap">

  <div class="page-hd">
    <div class="page-title" id="page-title"><span class="sk" style="width:240px;height:24px;display:inline-block"></span></div>
    <div class="page-team">Business Management</div>
  </div>

  <div id="status-bar"><span class="dot spin"></span><span id="status-msg">데이터 불러오는 중</span></div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-lbl">총 OTB</div>
      <div class="kpi-val" id="v-otb"><span class="sk" style="width:72px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub">EA</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">총 매출 수량</div>
      <div class="kpi-val" id="v-qty"><span class="sk" style="width:56px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub">EA</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">총 매출 금액</div>
      <div class="kpi-val" id="v-sales"><span class="sk" style="width:96px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub" id="v-sales-raw"><span class="sk" style="width:84px;height:11px;display:inline-block;margin-top:3px"></span></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">전체 Sell-thru</div>
      <div class="kpi-val purple" id="v-st"><span class="sk" style="width:56px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub" id="v-st-sub"><span class="sk" style="width:110px;height:11px;display:inline-block;margin-top:3px"></span></div>
    </div>
  </div>

  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">CHANNEL</span><span class="sec-title">채널별 요약</span></div>
      <div class="sec-line"></div>
    </div>
    <table>
      <thead><tr>
        <th class="L">채널</th><th>OTB (EA)</th><th>매출 수량 (EA)</th><th>매출 금액</th><th>Sell-thru</th>
      </tr></thead>
      <tbody id="ch-body">
        <tr><td colspan="5"><span class="sk" style="width:100%;height:30px;display:block"></span></td></tr>
        <tr><td colspan="5"><span class="sk" style="width:88%;height:30px;display:block;margin-top:3px"></span></td></tr>
        <tr><td colspan="5"><span class="sk" style="width:94%;height:30px;display:block;margin-top:3px"></span></td></tr>
      </tbody>
    </table>
  </div>

  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">DAILY</span><span class="sec-title">날짜별 매출 추이</span></div>
      <div class="sec-line"></div>
    </div>
    <div class="daily-wrap">
      <div class="daily-chart-col">
        <div class="chart-box"><canvas id="daily-chart" aria-label="날짜별 매출 막대 차트"></canvas></div>
      </div>
      <div class="daily-tbl-col">
        <table>
          <thead><tr>
            <th class="L">날짜</th><th>수량 (EA)</th><th>매출 금액</th><th>누적 Sell-thru</th>
          </tr></thead>
          <tbody id="dl-body"><tr><td colspan="4"><span class="sk" style="width:100%;height:26px;display:block"></span></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">PRODUCT</span><span class="sec-title">품목별 매출 — 구분자 기준 합계</span></div>
      <div class="sec-line"></div>
    </div>
    <div class="tbl-scroll">
      <table>
        <thead>
          <tr>
            <th class="L" rowspan="2" style="min-width:180px;vertical-align:bottom">구분자</th>
            <th rowspan="2" style="vertical-align:bottom">총 OTB</th>
            <th rowspan="2" style="vertical-align:bottom">총 매출수량</th>
            <th rowspan="2" style="vertical-align:bottom">총 매출금액</th>
            <th rowspan="2" style="vertical-align:bottom">Sell-thru</th>
            <th colspan="5" class="C bl" style="color:#9B2236;font-weight:600;padding-bottom:4px">채널별 매출 수량 (EA)</th>
          </tr>
          <tr>
            <th class="bl">오프라인</th>
            <th>통합몰</th>
            <th>스마트스토어</th>
            <th>카카오선물하기</th>
            <th>29CM</th>
          </tr>
        </thead>
        <tbody id="pr-body">
          <tr><td colspan="10"><span class="sk" style="width:100%;height:26px;display:block"></span></td></tr>
          <tr><td colspan="10"><span class="sk" style="width:90%;height:26px;display:block;margin-top:3px"></span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer" id="footer-txt">Business Management</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ⚠️ 여기에 구글 시트 웹에 게시(CSV) 주소 한 쌍을 각각 넣어주세요!
const CSV_PROD = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRY1kMxejp5R2-9gsTz_MP7uO-a-6Ep3BEMZpdpSX_KjB0ca6bxXV4nRu1ZeWVi3A/pub?gid=804611156&single=true&output=csv';
const CSV_SALE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRY1kMxejp5R2-9gsTz_MP7uO-a-6Ep3BEMZpdpSX_KjB0ca6bxXV4nRu1ZeWVi3A/pub?gid=2099164386&single=true&output=csv';

const HDR = {
  theme:    ['테마','theme'],
  code:     ['88코드','코드','code','product_code','제품코드','barcode'],
  name:     ['상품명','제품명','name'],
  gubu:     ['구분자','gubu','category','구분'],
  otb_off:  ['오프라인 otb','오프라인otb','offline otb','offline_otb'],
  otb_mall: ['통합몰 otb','통합몰otb','mall otb','mall_otb'],
  otb_smt:  ['스스 otb','스마트스토어 otb','스마트스토어otb','smt_otb','스마트 otb'],
  otb_all:  ['총 otb','총  otb','total otb','total_otb','총otb'],
  date:     ['날짜','date','일자'],
  channel:  ['판매채널','채널','channel','세부채널'],
  sale_code:['제품코드','88코드','코드','code','product_code'],
  qty:      ['매출수량','수량','qty','quantity','판매수량'],
  sales:    ['매출금액','금액','sales','amount','판매금액'],
  sale_gubu:['구분자','gubu','category'],
};

function detectHeaders(rows) {
  if (!rows.length) return {};
  const actual = Object.keys(rows[0]).map(h => h.trim());
  const res = {};
  for (const [key, cands] of Object.entries(HDR)) {
    for (const c of cands) {
      const match = actual.find(h => h.toLowerCase().replace(/\s+/g,'') === c.replace(/\s+/g,''));
      if (match) { res[key] = match; break; }
    }
  }
  return res;
}

function g(row, hMap, key, fb='') {
  const col = hMap[key];
  if (!col || row[col] === undefined) return fb;
  return String(row[col]).trim();
}

const toN  = v => parseFloat(String(v).replace(/,/g,'')) || 0;
const toI  = v => Math.round(toN(v));
const fmtN = v => Number(v).toLocaleString('ko-KR');
const fmtSt = v => (v > 0 ? v.toFixed(1) : '0.0') + '%';
const fmtM  = w => (!w||w===0) ? '—' : (w/1_000_000).toFixed(1)+'백만';
const fmtMR = w => '₩'+fmtN(Math.round(w));
const dash  = '<span class="muted">—</span>';

function toMMDD(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  if (/^\d{4,5}$/.test(s)) {
    const d = new Date(1899,11,30); d.setDate(d.getDate()+parseInt(s));
    return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[2]}/${iso[3]}`;
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})/);
  if (mdy) return `${String(mdy[1]).padStart(2,'0')}/${String(mdy[2]).padStart(2,'0')}`;
  return s.slice(0,5)||null;
}

function toBucket(ch) {
  const s = String(ch||'').toLowerCase().replace(/\s+/g, '');
  if (s.includes('스마트스토어') || s.includes('네이버') || s.includes('스스')) return '스마트스토어';
  if (s.includes('카카오선물하기') || s.includes('카카오') || s.includes('선물하기')) return '카카오선물하기';
  if (s.includes('29cm') || s.includes('이십구센치')) return '29CM';
  if (s.includes('통합몰') || s.includes('자사몰') || s.includes('쿠팡')) return '통합몰';
  if (s.includes('명동') || s.includes('홍대') || s.includes('성수') || s.includes('분당') || s.includes('라인프렌즈') || s.includes('스퀘어')) {
    return '오프라인';
  }
  return '오프라인';
}

function fetchCSV(url) {
  return new Promise((resolve,reject) => {
    Papa.parse(url, {
      download:true, header:true, skipEmptyLines:true,
      transformHeader: h => h.trim(),
      complete: r => resolve(r.data),
      error:    e => reject(new Error(e.message||String(e))),
    });
  });
}

function setStatus(type, msg) {
  const bar = document.getElementById('status-bar');
  bar.querySelector('.dot').className = 'dot '+type;
  bar.className = type;
  document.getElementById('status-msg').textContent = msg;
}

let chartInst = null;
const PAL = ['#1E2029','#555A6E','#8A8FA3','#B0B5C1','#D1D5DB'];

function drawChart(labels, salesArr) {
  const ctx = document.getElementById('daily-chart').getContext('2d');
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  if (!labels.length) return;
  chartInst = new Chart(ctx, {
    type:'bar',
    data:{labels, datasets:[{data:salesArr, backgroundColor:labels.map((_,k)=>PAL[Math.min(k,PAL.length-1)]), borderRadius:4, borderSkipped:false}]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>fmtM(c.parsed.y)}}},
      scales:{
        x:{grid:{display:false},border:{display:false},ticks:{font:{size:11,family:'"Noto Sans KR",sans-serif'},color:'#8A8FA3',maxRotation:0,autoSkip:false}},
        y:{grid:{color:'#EFEFEF'},border:{display:false},ticks:{font:{size:10},color:'#8A8FA3',callback:v=>(v/1_000_000).toFixed(0)+'백만'}}
      },
      layout:{padding:{top:30}}
    },
    plugins:[{
      id:'topLabel',
      afterDatasetsDraw(chart){
        const {ctx:c,data}=chart;
        chart.getDatasetMeta(0).data.forEach((bar,i)=>{
          const v=data.datasets[0].data[i]; if(!v) return;
          c.save(); c.font='600 11px "Noto Sans KR",sans-serif';
          c.fillStyle='#1E2029'; c.textAlign='center';
          c.fillText(fmtM(v),bar.x,bar.y-8); c.restore();
        });
      }
    }]
  });
}

function renderKPI(totOtb, totQty, totSales) {
  const st = totOtb>0?totQty/totOtb*100:0;
  document.getElementById('v-otb').textContent       = fmtN(totOtb);
  document.getElementById('v-qty').textContent       = fmtN(totQty);
  document.getElementById('v-sales').textContent     = fmtM(totSales);
  document.getElementById('v-sales-raw').textContent = totSales>0?fmtMR(totSales):'—';
  document.getElementById('v-st').textContent        = fmtSt(st);
  document.getElementById('v-st-sub').textContent    = `${fmtN(totQty)} / ${fmtN(totOtb)} EA`;
}

// 💡 [수정] OTB 데이터가 없는 채널은 대시보드 목록에서 제외 처리
function renderChannel(byCh, otbMap) {
  const ALL_ORDER = ['오프라인', '통합몰', '스마트스토어', '카카오선물하기', '29CM'];
  const BADGE = {'오프라인':'b-off', '통합몰':'b-mall', '스마트스토어':'b-smt', '카카오선물하기':'b-kakao', '29CM':'b-29cm'};
  let html = '';
  
  // OTB가 0보다 크거나, 혹은 실제로 발생한 매출 수량/금액이 있는 유효 채널만 필터링
  const activeChannels = ALL_ORDER.filter(name => {
    const otb = otbMap[name] || 0;
    const qty = byCh[name]?.qty || 0;
    const sales = byCh[name]?.sales || 0;
    return otb > 0 || qty > 0 || sales > 0;
  });

  activeChannels.forEach(name => {
    const d = byCh[name] || {qty:0, sales:0};
    const otb = otbMap[name] || 0;
    const st = otb > 0 ? d.qty / otb * 100 : 0;
    html += `<tr><td class="L"><span class="${BADGE[name]}">${name}</span></td><td>${otb>0?fmtN(otb):'—'}</td><td>${d.qty>0?fmtN(d.qty):'—'}</td><td>${fmtM(d.sales)}</td><td>${otb>0?fmtSt(st):'—'}</td></tr>`;
  });
  
  // 온라인 합계 계산 (오프라인을 제외한 활성화된 온라인 채널만 합산)
  const onlineChannels = activeChannels.filter(n => n !== '오프라인');
  const onQ = onlineChannels.reduce((sum, n) => sum + (byCh[n]?.qty || 0), 0);
  const onS = onlineChannels.reduce((sum, n) => sum + (byCh[n]?.sales || 0), 0);
  const onO = onlineChannels.reduce((sum, n) => sum + (otbMap[n] || 0), 0);
  
  if (onlineChannels.length > 0) {
    html += `<tr class="row-sub"><td class="L">온라인 합계</td><td>${onO>0?fmtN(onO):'—'}</td><td>${onQ>0?fmtN(onQ):'—'}</td><td>${fmtM(onS)}</td><td>${onO>0?fmtSt(onQ/onO*100):'—'}</td></tr>`;
  }
  
  const tO = Object.values(otbMap).reduce((a,v)=>a+v,0);
  const tQ = Object.values(byCh).reduce((a,v)=>a+(v.qty||0),0);
  const tS = Object.values(byCh).reduce((a,v)=>a+(v.sales||0),0);
  
  html += `<tr class="row-total"><td class="L">전체 합계</td><td>${fmtN(tO)}</td><td>${fmtN(tQ)}</td><td>${fmtM(tS)}</td><td>${fmtSt(tO>0?tQ/tO*100:0)}</td></tr>`;
  document.getElementById('ch-body').innerHTML = html;
}

function renderDaily(byDate, totalOtb) {
  const sorted=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0]));
  const labels=[],salesArr=[];
  let cumQty=0,html='';
  sorted.forEach(([date,d])=>{
    cumQty+=d.qty; labels.push(date); salesArr.push(d.sales);
    html+=`<tr><td class="L" style="font-size:11px">${date}</td><td style="font-size:11px">${fmtN(d.qty)}</td><td style="font-size:11px">${fmtM(d.sales)}</td><td style="font-size:11px">${fmtSt(totalOtb>0?cumQty/totalOtb*100:0)}</td></tr>`;
  });
  if (sorted.length>1) {
    const tQ=sorted.reduce((a,e)=>a+e[1].qty,0);
    const tS=sorted.reduce((a,e)=>a+e[1].sales,0);
    html+=`<tr class="row-total"><td class="L">합계</td><td>${fmtN(tQ)}</td><td>${fmtM(tS)}</td><td></td></tr>`;
  }
  if (!sorted.length) html=`<tr><td colspan="4" style="text-align:center;padding:20px;color:#8A8FA3;font-size:11px">CSV_SALE URL 설정 후 표시됩니다</td></tr>`;
  document.getElementById('dl-body').innerHTML=html;
  drawChart(labels,salesArr);
}

function renderProducts(gubuMap) {
  let html='',tO=0,tQ=0,tS=0;
  Object.values(gubuMap).sort((a,b)=>b.sales-a.sales).forEach(g=>{
    const qty = g.qtyOff + g.qtyMall + g.qtySmt + g.qtyKakao + g.qty29;
    const sales = g.salesOff + g.salesMall + g.salesSmt + g.salesKakao + g.sales29;
    const st = g.otb > 0 ? qty / g.otb * 100 : 0;
    const hi = st >= 30;
    tO += g.otb; tQ += qty; tS += sales;
    
    html += `<tr class="${hi?'row-hi':''}">
      <td class="nm">${g.name}</td>
      <td>${fmtN(g.otb)}</td>
      <td>${fmtN(qty)}</td>
      <td>${fmtM(sales)}</td>
      <td class="${hi?'hi':''}">${fmtSt(st)}</td>
      <td class="bl">${g.qtyOff>0?fmtN(g.qtyOff):dash}</td>
      <td>${g.qtyMall>0?fmtN(g.qtyMall):dash}</td>
      <td>${g.qtySmt>0?fmtN(g.qtySmt):dash}</td>
      <td>${g.qtyKakao>0?fmtN(g.qtyKakao):dash}</td>
      <td>${g.qty29>0?fmtN(g.qty29):dash}</td>
    </tr>`;
  });
  html += `<tr class="row-total"><td class="L">합계</td><td>${fmtN(tO)}</td><td>${fmtN(tQ)}</td><td>${fmtM(tS)}</td><td>${fmtSt(tO>0?tQ/tO*100:0)}</td><td class="bl"></td><td></td><td></td><td></td><td></td></tr>`;
  document.getElementById('pr-body').innerHTML=html||'<tr><td colspan="10" style="text-align:center;padding:20px;color:#8A8FA3;font-size:11px">제품 데이터 없음</td></tr>';
}

function showErr(msg, detail) {
  setStatus('fail','데이터 로드 실패');
  document.getElementById('page-title').textContent='신상품 매출 리포트';
  const html=`<tr><td colspan="10"><div class="err-box"><b>${msg}</b>${detail?`<pre>${detail}</pre>`:''}</div></td></tr>`;
  ['ch-body','dl-body','pr-body'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=html;});
}

async function init() {
  setStatus('spin','데이터 불러오는 중');
  let prodRows=[],saleRows=[];
  try {
    const promises=[fetchCSV(CSV_PROD)];
    if (CSV_SALE) promises.push(fetchCSV(CSV_SALE));
    const results=await Promise.all(promises);
    prodRows=results[0]||[];
    saleRows=results[1]||[];
  } catch(e) {
    showErr('CSV 불러오기 실패 — 구글 시트 웹에 게시(CSV) 설정 확인',e.message);
    return;
  }

  if (!prodRows.length) { showErr('출시상품데이터가 비어있습니다'); return; }

  const pH=detectHeaders(prodRows);
  const sH=saleRows.length?detectHeaders(saleRows):{};

  let theme='';
  const codeMap={}, gubuMap={};

  prodRows.forEach(r=>{
    const code=g(r,pH,'code'); if(!code) return;
    if(!theme) theme=g(r,pH,'theme');
    const gubu=g(r,pH,'gubu')||g(r,pH,'name')||code;
    const otbOff=toI(g(r,pH,'otb_off'));
    const otbMall=toI(g(r,pH,'otb_mall'));
    const otbSmt=toI(g(r,pH,'otb_smt'));
    const otbRaw=toI(g(r,pH,'otb_all'));
    const otbAll=otbRaw>0?otbRaw:(otbOff+otbMall+otbSmt);
    codeMap[code]={gubu,otbOff,otbMall,otbSmt};
    
    if(!gubuMap[gubu]) gubuMap[gubu]={
      name:gubu, otb:0, otbOff:0, otbMall:0, otbSmt:0,
      qtyOff:0, qtyMall:0, qtySmt:0, qtyKakao:0, qty29:0,
      salesOff:0, salesMall:0, salesSmt:0, salesKakao:0, sales29:0, sales:0
    };
    gubuMap[gubu].otb+=otbAll; gubuMap[gubu].otbOff+=otbOff; gubuMap[gubu].otbMall+=otbMall; gubuMap[gubu].otbSmt+=otbSmt;
  });

  const titleText=theme||'신상품 매출 리포트';
  document.getElementById('page-title').textContent=titleText;
  document.title=titleText+' — Business Management';
  document.getElementById('footer-txt').textContent='Business Management · '+titleText;

  const byDate={};
  
  const byCh={
    '오프라인':{qty:0,sales:0},
    '통합몰':{qty:0,sales:0},
    '스마트스토어':{qty:0,sales:0},
    '카카오선물하기':{qty:0,sales:0},
    '29CM':{qty:0,sales:0}
  };

  saleRows.forEach(r=>{
    const date=toMMDD(g(r,sH,'date')); if(!date) return;
    const ch=g(r,sH,'channel');
    const code=g(r,sH,'sale_code');
    const qty=toI(g(r,sH,'qty'));
    const sales=toN(g(r,sH,'sales'));
    const gubu=g(r,sH,'sale_gubu')||codeMap[code]?.gubu||'';
    const bkt=toBucket(ch);
    
    if(!byDate[date]) byDate[date]={qty:0,sales:0};
    byDate[date].qty+=qty; byDate[date].sales+=sales;
    if(byCh[bkt]) { byCh[bkt].qty+=qty; byCh[bkt].sales+=sales; }
    
    if(gubu&&gubuMap[gubu]){
      if(bkt==='오프라인')          {gubuMap[gubu].qtyOff+=qty; gubuMap[gubu].salesOff+=sales;}
      else if(bkt==='통합몰')       {gubuMap[gubu].qtyMall+=qty;gubuMap[gubu].salesMall+=sales;}
      else if(bkt==='스마트스토어')  {gubuMap[gubu].qtySmt+=qty; gubuMap[gubu].salesSmt+=sales;}
      else if(bkt==='카카오선물하기'){gubuMap[gubu].qtyKakao+=qty;gubuMap[gubu].salesKakao+=sales;}
      else if(bkt==='29CM')         {gubuMap[gubu].qty29+=qty;  gubuMap[gubu].sales29+=sales;}
      gubuMap[gubu].sales+=sales;
    }
  });

  const otbMap={
    '오프라인':     prodRows.reduce((a,r)=>a+toI(g(r,pH,'otb_off')),0),
    '통합몰':       prodRows.reduce((a,r)=>a+toI(g(r,pH,'otb_mall')),0),
    '스마트스토어': prodRows.reduce((a,r)=>a+toI(g(r,pH,'otb_smt')),0),
    '카카오선물하기': 0, 
    '29CM':         0
  };
  const totalOtb  =Object.values(otbMap).reduce((a,v)=>a+v,0);
  const totalQty  =Object.values(byDate).reduce((a,d)=>a+d.qty,0);
  const totalSales=Object.values(byDate).reduce((a,d)=>a+d.sales,0);

  renderKPI(totalOtb,totalQty,totalSales);
  renderChannel(byCh,otbMap);
  renderDaily(byDate,totalOtb);
  renderProducts(gubuMap);

  const now=new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  setStatus('ok',`마지막 업데이트: ${now} · 제품 ${prodRows.length}행 · 매출 ${saleRows.length}행`);
}

init();
</script>
</body>
</html>
