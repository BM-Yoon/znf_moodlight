<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신상품 매출 리포트 — Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',-apple-system,sans-serif;background:#F9F8F6;color:#1E2029;padding:36px 24px;min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto}
.page-hd{margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #EFEFEF}
.page-title{font-size:20px;font-weight:700;color:#1E2029;margin-bottom:4px;min-height:28px}
.page-team{font-size:11px;color:#8A8FA3}
#status-bar{font-size:11px;margin-bottom:24px;display:flex;align-items:center;gap:7px;min-height:18px;color:#8A8FA3}
#status-bar.ok{color:#0F6E56}
#status-bar.fail{color:#9B2236}
.dot{width:7px;height:7px;border-radius:50%;background:#D1D5DB;flex-shrink:0}
.dot.ok{background:#0F6E56}
.dot.fail{background:#9B2236}
.dot.spin{background:transparent;border:2px solid #D1D5DB;border-top-color:#1E2029;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
@media(max-width:620px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:#fff;border:1px solid #EFEFEF;border-radius:10px;padding:18px 20px}
.kpi-lbl{font-size:11px;color:#8A8FA3;margin-bottom:8px}
.kpi-val{font-size:22px;font-weight:700;color:#1E2029;min-height:32px}
.kpi-val.purple{color:#534AB7}
.kpi-sub{font-size:10px;color:#8A8FA3;margin-top:4px;min-height:14px}
.sec-card{background:#fff;border:1px solid #EFEFEF;border-radius:12px;padding:24px 28px;margin-bottom:18px}
.sec-hd{margin-bottom:18px}
.sec-hd-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-badge{background:#F5E6E9;color:#9B2236;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:.08em;white-space:nowrap}
.sec-title{font-size:14px;font-weight:700;color:#1E2029}
.sec-line{height:.5px;background:#9B2236}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#8A8FA3;font-weight:500;text-align:right;padding:5px 10px 7px;border-bottom:1px solid #EFEFEF;white-space:nowrap}
th.L{text-align:left}
th.C{text-align:center}
td{font-size:11.5px;padding:8px 10px;text-align:right;color:#1E2029;border-bottom:.5px solid #EFEFEF}
td.L{text-align:left}
tr:last-child td{border-bottom:none}
.row-sub td{color:#8A8FA3;font-size:11px}
.row-sub td.L{text-align:left}
.row-total td{font-weight:700;border-top:1px solid #EFEFEF;border-bottom:none}
.row-total td.L{text-align:left}
.row-hi{background:#FEF7F7}
.hi{color:#9B2236;font-weight:700}
.nm{font-size:11px;color:#8A8FA3;text-align:left;max-width:180px;white-space:normal;word-break:keep-all;line-height:1.5}
.tbl-scroll{overflow-x:auto}
.tbl-scroll table{min-width:900px}
.bl{border-left:1px solid #EFEFEF !important}
.muted{color:#D1D5DB}
.b-off{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#FAECE7;color:#993C1D}
.b-mall{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E1F5EE;color:#0F6E56}
.b-smt{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E6F1FB;color:#185FA5}
.b-kakao{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#FFF9E6;color:#7A5F00}
.b-29cm{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#F4F4F4;color:#222222}
.daily-wrap{display:flex;gap:28px;align-items:flex-start}
.daily-chart-col{flex:1.4}
.daily-tbl-col{flex:1;padding-top:4px}
@media(max-width:768px){.daily-wrap{flex-direction:column}.daily-chart-col,.daily-tbl-col{flex:none;width:100%}}
.chart-box{position:relative;width:100%;height:220px}
.sk{display:inline-block;border-radius:3px;background:linear-gradient(90deg,#EFEFEF 25%,#F9F8F6 50%,#EFEFEF 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.err-box{padding:14px 18px;border-radius:8px;background:#FFF5F5;border:1px solid #F5C6CB;font-size:12px;color:#9B2236;line-height:1.8}
.err-box pre{margin-top:8px;padding:8px 12px;background:#fff;border-radius:4px;font-size:10px;color:#555;white-space:pre-wrap;word-break:break-all}
.footer{margin-top:24px;font-size:10px;color:#C8CBD2;text-align:right}
</style>
</head>
<body>
<div class="wrap">

  <div class="page-hd">
    <div class="page-title" id="page-title"><span class="sk" style="width:240px;height:24px;display:inline-block"></span></div>
    <div class="page-team">Business Management</div>
  </div>

  <div id="status-bar"><span class="dot spin"></span><span id="status-msg">데이터 불러오는 중</span></div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-lbl">총 OTB</div>
      <div class="kpi-val" id="v-otb"><span class="sk" style="width:72px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub">EA</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">총 매출 수량</div>
      <div class="kpi-val" id="v-qty"><span class="sk" style="width:56px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub">EA</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">총 매출 금액</div>
      <div class="kpi-val" id="v-sales"><span class="sk" style="width:96px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub" id="v-sales-raw"><span class="sk" style="width:84px;height:11px;display:inline-block;margin-top:3px"></span></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">전체 Sell-thru</div>
      <div class="kpi-val purple" id="v-st"><span class="sk" style="width:56px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub" id="v-st-sub"><span class="sk" style="width:110px;height:11px;display:inline-block;margin-top:3px"></span></div>
    </div>
  </div>

  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">CHANNEL</span><span class="sec-title">채널별 요약</span></div>
      <div class="sec-line"></div>
    </div>
    <table>
      <thead><tr>
        <th class="L">채널</th><th>OTB (EA)</th><th>매출 수량 (EA)</th><th>매출 금액</th><th>Sell-thru</th>
      </tr></thead>
      <tbody id="ch-body">
        <tr><td colspan="5"><span class="sk" style="width:100%;height:30px;display:block"></span></td></tr>
        <tr><td colspan="5"><span class="sk" style="width:88%;height:30px;display:block;margin-top:3px"></span></td></tr>
        <tr><td colspan="5"><span class="sk" style="width:94%;height:30px;display:block;margin-top:3px"></span></td></tr>
      </tbody>
    </table>
  </div>

  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">DAILY</span><span class="sec-title">날짜별 매출 추이</span></div>
      <div class="sec-line"></div>
    </div>
    <div class="daily-wrap">
      <div class="daily-chart-col">
        <div class="chart-box"><canvas id="daily-chart" aria-label="날짜별 매출 막대 차트"></canvas></div>
      </div>
      <div class="daily-tbl-col">
        <table>
          <thead><tr>
            <th class="L">날짜</th><th>수량 (EA)</th><th>매출 금액</th><th>누적 Sell-thru</th>
          </tr></thead>
          <tbody id="dl-body"><tr><td colspan="4"><span class="sk" style="width:100%;height:26px;display:block"></span></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">PRODUCT</span><span class="sec-title">품목별 매출 — 구분자 기준 합계</span></div>
      <div class="sec-line"></div>
    </div>
    <div class="tbl-scroll">
      <table>
        <thead>
          <tr>
            <th class="L" rowspan="2" style="min-width:180px;vertical-align:bottom">구분자</th>
            <th rowspan="2" style="vertical-align:bottom">총 OTB</th>
            <th rowspan="2" style="vertical-align:bottom">총 매출수량</th>
            <th rowspan="2" style="vertical-align:bottom">총 매출금액</th>
            <th rowspan="2" style="vertical-align:bottom">Sell-thru</th>
            <th colspan="5" class="C bl" style="color:#9B2236;font-weight:600;padding-bottom:4px">채널별 매출 수량 (EA)</th>
          </tr>
          <tr>
            <th class="bl">오프라인</th>
            <th>통합몰</th>
            <th>스마트스토어</th>
            <th>카카오선물하기</th>
            <th>29CM</th>
          </tr>
        </thead>
        <tbody id="pr-body">
          <tr><td colspan="10"><span class="sk" style="width:100%;height:26px;display:block"></span></td></tr>
          <tr><td colspan="10"><span class="sk" style="width:90%;height:26px;display:block;margin-top:3px"></span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer" id="footer-txt">Business Management</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

// ── CSV URL ───────────────────────────────────────────────────────────────
const CSV_PROD = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRY1kMxejp5R2-9gsTz_MP7uO-a-6Ep3BEMZpdpSX_KjB0ca6bxXV4nRu1ZeWVi3A/pub?gid=804611156&single=true&output=csv';
const CSV_SALE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRY1kMxejp5R2-9gsTz_MP7uO-a-6Ep3BEMZpdpSX_KjB0ca6bxXV4nRu1ZeWVi3A/pub?gid=2099164386&single=true&output=csv';

// ── 채널 상수 ─────────────────────────────────────────────────────────────
var ALL_CH   = ['오프라인','통합몰','스마트스토어','카카오선물하기','29CM'];
var CH_BADGE = {'오프라인':'b-off','통합몰':'b-mall','스마트스토어':'b-smt',
                '카카오선물하기':'b-kakao','29CM':'b-29cm'};
var CH_QTY   = {'오프라인':'qtyOff','통합몰':'qtyMall','스마트스토어':'qtySmt',
                '카카오선물하기':'qtyKakao','29CM':'qty29'};
var CH_SALES = {'오프라인':'salesOff','통합몰':'salesMall','스마트스토어':'salesSmt',
                '카카오선물하기':'salesKakao','29CM':'sales29'};

// ── 헤더 후보 사전 ────────────────────────────────────────────────────────
var HDR = {
  theme:    ['테마','theme'],
  code:     ['88코드','코드','code','product_code','제품코드','barcode','sku'],
  name:     ['상품명','제품명','name','품명'],
  gubu:     ['구분자','gubu','category','구분','카테고리'],
  otb_off:  ['오프라인 otb','오프라인otb','offline otb','offline_otb','오프라인 계획','오프라인계획'],
  otb_mall: ['통합몰 otb','통합몰otb','mall otb','mall_otb','통합몰 계획','통합몰계획','자사몰 otb','자사몰otb'],
  otb_smt:  ['스마트스토어 otb','스마트스토어otb','스스 otb','스스otb','smt_otb',
             '스마트 otb','스마트스토어 계획','네이버 otb'],
  otb_all:  ['총 otb','총  otb','total otb','total_otb','총otb','전체 otb'],
  date:     ['날짜','date','일자','판매일','판매일자'],
  channel:  ['세부채널','판매채널','채널','channel','세부 채널'],
  sale_code:['제품코드','88코드','코드','code','product_code','sku','barcode'],
  qty:      ['매출수량','수량','qty','quantity','판매수량','판매 수량'],
  sales:    ['매출금액','금액','sales','amount','판매금액','판매 금액'],
  sale_gubu:['구분자','구분자(카테고리)','gubu','category','구분','카테고리'],
};

// ── 문자열 정규화 (Unicode NFC + 공백 제거) ───────────────────────────────
function norm(s) {
  return String(s||'').normalize('NFC').replace(/\s+/g,'').toLowerCase();
}

// ── 헤더 감지 (exact → fuzzy 두 단계) ────────────────────────────────────
function detectHeaders(rows) {
  if (!rows || !rows.length) return {};
  var actual = Object.keys(rows[0]).map(function(h){ return String(h).trim(); });
  var res = {};

  // 1단계: 정규화 exact match
  Object.keys(HDR).forEach(function(key) {
    var cands = HDR[key];
    for (var i = 0; i < cands.length; i++) {
      var nc = norm(cands[i]);
      var match = actual.find(function(h){ return norm(h) === nc; });
      if (match) { res[key] = match; break; }
    }
  });

  // ★ Bug2: 2단계 — OTB 컬럼 퍼지 탐색 (exact 실패 시)
  // 채널 키워드 + OTB/계획/수량 키워드가 동시에 포함된 컬럼을 substring으로 탐색
  function fuzzyOtb(channelKws) {
    return actual.find(function(h) {
      var hn = norm(h);
      var hasOtb = hn.indexOf('otb') !== -1 || hn.indexOf('oob') !== -1 ||
                   hn.indexOf('계획') !== -1 || hn.indexOf('수량') !== -1;
      var hasCh  = channelKws.some(function(kw){ return hn.indexOf(norm(kw)) !== -1; });
      return hasOtb && hasCh;
    });
  }
  if (!res.otb_off)  res.otb_off  = fuzzyOtb(['오프라인','offline','오프']);
  if (!res.otb_mall) res.otb_mall = fuzzyOtb(['통합몰','자사몰','mall']);
  if (!res.otb_smt)  res.otb_smt  = fuzzyOtb(['스마트스토어','스마트','스스','네이버','smt']);
  if (!res.otb_all)  res.otb_all  = fuzzyOtb(['총','전체','total']);

  return res;
}

// ── 셀 값 안전 추출 (NFC 정규화 포함) ───────────────────────────────────
function g(row, hMap, key, fb) {
  fb = (fb === undefined) ? '' : fb;
  try {
    var col = hMap[key];
    if (!col) return fb;
    var v = row[col];
    return (v === undefined || v === null) ? fb : String(v).normalize('NFC').trim();
  } catch(e) { return fb; }
}

// ── 숫자 유틸 ─────────────────────────────────────────────────────────────
var toN   = function(v){ try{ return parseFloat(String(v).replace(/,/g,''))||0; }catch(e){ return 0; } };
var toI   = function(v){ return Math.round(toN(v)); };
var fmtN  = function(v){ try{ return Number(v).toLocaleString('ko-KR'); }catch(e){ return '0'; } };
var fmtSt = function(v){ return (v>0?Number(v).toFixed(1):'0.0')+'%'; };
var fmtM  = function(w){ return (!w||w===0)?'—':(w/1000000).toFixed(1)+'백만'; };
var fmtMR = function(w){ return '\u20a9'+fmtN(Math.round(w)); };
var dash  = '<span class="muted">—</span>';

// ── 날짜 파싱 ─────────────────────────────────────────────────────────────
function toMMDD(raw) {
  if (!raw) return null;
  var s = String(raw).trim();
  if (/^\d{5}$/.test(s)) {
    var n = parseInt(s,10);
    if (n > 30000) {
      var d = new Date(1899,11,30);
      d.setDate(d.getDate()+n);
      return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
    }
  }
  var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return iso[2]+'/'+iso[3];
  var mdy = s.match(/^(\d{1,2})\/(\d{1,2})/);
  if (mdy) return String(mdy[1]).padStart(2,'0')+'/'+String(mdy[2]).padStart(2,'0');
  var dot = s.match(/^\d{4}\.(\d{1,2})\.(\d{1,2})/);
  if (dot) return String(dot[1]).padStart(2,'0')+'/'+String(dot[2]).padStart(2,'0');
  return null;
}

// ── 채널 판정 ─────────────────────────────────────────────────────────────
function toBucket(ch) {
  var s  = String(ch||'').replace(/\s+/g,'');
  var sl = s.toLowerCase();
  if (s.indexOf('카카오선물하기')!==-1) return '카카오선물하기';
  if (s.indexOf('스마트스토어')  !==-1) return '스마트스토어';
  if (s.indexOf('통합몰')        !==-1) return '통합몰';
  if (sl.indexOf('29cm')!==-1||s.indexOf('이십구센치')!==-1) return '29CM';
  if (s.indexOf('명동')    !==-1||s.indexOf('홍대')   !==-1||
      s.indexOf('성수')    !==-1||s.indexOf('분당')   !==-1||
      s.indexOf('오프라인')!==-1||s.indexOf('매장')   !==-1||
      s.indexOf('직영')    !==-1) return '오프라인';
  return '오프라인';
}

// ── CSV 로드 ──────────────────────────────────────────────────────────────
function fetchCSV(url) {
  return new Promise(function(resolve,reject){
    Papa.parse(url,{
      download:true, header:true, skipEmptyLines:true,
      transformHeader:function(h){ return String(h).trim(); },
      complete:function(r){ resolve(r.data||[]); },
      error:function(e){ reject(new Error(e.message||String(e))); },
    });
  });
}

// ── 상태바 ────────────────────────────────────────────────────────────────
function setStatus(type,msg){
  var bar=document.getElementById('status-bar'); if(!bar)return;
  var dot=bar.querySelector('.dot'); if(dot)dot.className='dot '+type;
  bar.className=type;
  var sm=document.getElementById('status-msg'); if(sm)sm.textContent=msg;
}

// ── 차트 ──────────────────────────────────────────────────────────────────
var chartInst=null;
var PAL=['#1E2029','#555A6E','#8A8FA3','#B0B5C1','#D1D5DB'];

function drawChart(labels,salesArr){
  var canvas=document.getElementById('daily-chart'); if(!canvas)return;
  var ctx=canvas.getContext('2d');
  if(chartInst){chartInst.destroy();chartInst=null;}
  if(!labels.length)return;
  chartInst=new Chart(ctx,{
    type:'bar',
    data:{labels:labels,datasets:[{
      data:salesArr,
      backgroundColor:labels.map(function(_,k){return PAL[Math.min(k,PAL.length-1)];}),
      borderRadius:4,borderSkipped:false,
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(c){return fmtM(c.parsed.y);}}},
      },
      scales:{
        x:{grid:{display:false},border:{display:false},
           ticks:{font:{size:11,family:'"Noto Sans KR",sans-serif'},color:'#8A8FA3',maxRotation:0,autoSkip:false}},
        y:{grid:{color:'#EFEFEF'},border:{display:false},
           ticks:{font:{size:10},color:'#8A8FA3',callback:function(v){return (v/1000000).toFixed(0)+'백만';}}},
      },
      layout:{padding:{top:30}},
    },
    plugins:[{
      id:'topLabel',
      afterDatasetsDraw:function(chart){
        var ctx2=chart.ctx,data=chart.data;
        chart.getDatasetMeta(0).data.forEach(function(bar,i){
          var v=data.datasets[0].data[i]; if(!v)return;
          ctx2.save();
          ctx2.font='600 11px "Noto Sans KR",sans-serif';
          ctx2.fillStyle='#1E2029';ctx2.textAlign='center';
          ctx2.fillText(fmtM(v),bar.x,bar.y-8);
          ctx2.restore();
        });
      },
    }],
  });
}

// ── KPI ───────────────────────────────────────────────────────────────────
function renderKPI(totOtb,totQty,totSales){
  var st=totOtb>0?totQty/totOtb*100:0;
  function set(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}
  set('v-otb',      fmtN(totOtb));
  set('v-qty',      fmtN(totQty));
  set('v-sales',    fmtM(totSales));
  set('v-sales-raw',totSales>0?fmtMR(totSales):'—');
  set('v-st',       fmtSt(st));
  set('v-st-sub',   fmtN(totQty)+' / '+fmtN(totOtb)+' EA');
}

// ── 채널별 요약 ───────────────────────────────────────────────────────────
function renderChannel(byCh,otbMap,activeChannels){
  var html='';
  activeChannels.forEach(function(n){
    var d=byCh[n]||{qty:0,sales:0};
    var otb=otbMap[n]||0;
    var st=otb>0?d.qty/otb*100:0;
    html+='<tr>'
      +'<td class="L"><span class="'+CH_BADGE[n]+'">'+n+'</span></td>'
      +'<td>'+(otb>0?fmtN(otb):'—')+'</td>'
      +'<td>'+(d.qty>0?fmtN(d.qty):'—')+'</td>'
      +'<td>'+fmtM(d.sales)+'</td>'
      +'<td>'+(otb>0?fmtSt(st):'—')+'</td>'
      +'</tr>';
  });
  var onl=activeChannels.filter(function(n){return n!=='오프라인';});
  if(onl.length>0){
    var onQ=onl.reduce(function(s,n){return s+((byCh[n]&&byCh[n].qty)||0);},0);
    var onS=onl.reduce(function(s,n){return s+((byCh[n]&&byCh[n].sales)||0);},0);
    var onO=onl.reduce(function(s,n){return s+(otbMap[n]||0);},0);
    html+='<tr class="row-sub">'
      +'<td class="L">온라인 합계</td>'
      +'<td>'+(onO>0?fmtN(onO):'—')+'</td>'
      +'<td>'+(onQ>0?fmtN(onQ):'—')+'</td>'
      +'<td>'+fmtM(onS)+'</td>'
      +'<td>'+(onO>0?fmtSt(onQ/onO*100):'—')+'</td>'
      +'</tr>';
  }
  var tO=Object.values(otbMap).reduce(function(a,v){return a+v;},0);
  var tQ=Object.values(byCh).reduce(function(a,v){return a+(v.qty||0);},0);
  var tS=Object.values(byCh).reduce(function(a,v){return a+(v.sales||0);},0);
  html+='<tr class="row-total">'
    +'<td class="L">전체 합계</td>'
    +'<td>'+fmtN(tO)+'</td><td>'+fmtN(tQ)+'</td><td>'+fmtM(tS)+'</td>'
    +'<td>'+fmtSt(tO>0?tQ/tO*100:0)+'</td></tr>';
  var el=document.getElementById('ch-body');
  if(el)el.innerHTML=html||'<tr><td colspan="5" style="text-align:center;padding:16px;color:#8A8FA3;font-size:11px">채널 데이터 없음</td></tr>';
}

// ── 날짜별 추이 ───────────────────────────────────────────────────────────
function renderDaily(byDate,totalOtb){
  var sorted=Object.entries(byDate).sort(function(a,b){return a[0].localeCompare(b[0]);});
  var labels=[],salesArr=[],cumQty=0,html='';
  sorted.forEach(function(e){
    var date=e[0],d=e[1];
    cumQty+=d.qty;labels.push(date);salesArr.push(d.sales);
    html+='<tr>'
      +'<td class="L" style="font-size:11px">'+date+'</td>'
      +'<td style="font-size:11px">'+fmtN(d.qty)+'</td>'
      +'<td style="font-size:11px">'+fmtM(d.sales)+'</td>'
      +'<td style="font-size:11px">'+fmtSt(totalOtb>0?cumQty/totalOtb*100:0)+'</td>'
      +'</tr>';
  });
  if(sorted.length>1){
    var tQ=sorted.reduce(function(a,e){return a+e[1].qty;},0);
    var tS=sorted.reduce(function(a,e){return a+e[1].sales;},0);
    html+='<tr class="row-total"><td class="L">합계</td><td>'+fmtN(tQ)+'</td><td>'+fmtM(tS)+'</td><td></td></tr>';
  }
  if(!sorted.length)html='<tr><td colspan="4" style="text-align:center;padding:20px;color:#8A8FA3;font-size:11px">매출 데이터 없음</td></tr>';
  var el=document.getElementById('dl-body');if(el)el.innerHTML=html;
  drawChart(labels,salesArr);
}

// ── 품목별 매출 (Bug3: thead·tbody 완전 동기화) ───────────────────────────
function renderProducts(gubuMap,activeChannels){
  var prBody=document.getElementById('pr-body');if(!prBody)return;

  // ★ Bug3: parentElement로 table 탐색 (closest 대신 명시적 접근)
  var el=prBody;
  while(el&&el.tagName!=='TABLE')el=el.parentElement;
  if(el){
    var thead=el.querySelector('thead');
    if(thead){
      var rows=thead.querySelectorAll('tr');
      // 1행: 채널 그룹 헤더 colspan 수정
      if(rows[0]){
        var ths=rows[0].querySelectorAll('th');
        var groupTh=ths[ths.length-1];
        if(groupTh)groupTh.colSpan=activeChannels.length;
      }
      // 2행: activeChannels 순서와 1:1 동기화
      if(rows[1]){
        rows[1].innerHTML=activeChannels.map(function(n,i){
          return '<th'+(i===0?' class="bl"':'')+'>'+n+'</th>';
        }).join('');
      }
    }
  }

  var totalCols=5+activeChannels.length;
  var html='',tO=0,tQ=0,tS=0;

  Object.values(gubuMap).sort(function(a,b){return b._sales-a._sales;}).forEach(function(gd){
    var qty=0,sales=0;
    ALL_CH.forEach(function(n){qty+=gd[CH_QTY[n]]||0;sales+=gd[CH_SALES[n]]||0;});
    var st=gd.otb>0?qty/gd.otb*100:0;
    var hi=st>=30;
    tO+=gd.otb;tQ+=qty;tS+=sales;
    // ★ Bug3: activeChannels 순서 그대로 td 생성
    var chTds=activeChannels.map(function(n,i){
      var v=gd[CH_QTY[n]]||0;
      return '<td'+(i===0?' class="bl"':'')+'>'+(v>0?fmtN(v):dash)+'</td>';
    }).join('');
    html+='<tr class="'+(hi?'row-hi':'')+'">'
      +'<td class="nm">'+gd.name+'</td>'
      +'<td>'+fmtN(gd.otb)+'</td>'
      +'<td>'+fmtN(qty)+'</td>'
      +'<td>'+fmtM(sales)+'</td>'
      +'<td class="'+(hi?'hi':'')+'">'+fmtSt(st)+'</td>'
      +chTds+'</tr>';
  });

  if(!html){
    html='<tr><td colspan="'+totalCols+'" style="text-align:center;padding:20px;color:#8A8FA3;font-size:11px">제품 데이터 없음</td></tr>';
  }else{
    var blankChTds=activeChannels.map(function(_,i){return '<td'+(i===0?' class="bl"':'')+'>—</td>';}).join('');
    html+='<tr class="row-total"><td class="L">합계</td>'
      +'<td>'+fmtN(tO)+'</td><td>'+fmtN(tQ)+'</td><td>'+fmtM(tS)+'</td>'
      +'<td>'+fmtSt(tO>0?tQ/tO*100:0)+'</td>'+blankChTds+'</tr>';
  }
  prBody.innerHTML=html;
}

// ── 에러 렌더링 ───────────────────────────────────────────────────────────
function showErr(msg,detail){
  setStatus('fail','데이터 로드 실패');
  var pt=document.getElementById('page-title');if(pt)pt.textContent='신상품 매출 리포트';
  var dh=detail?'<pre>'+detail+'</pre>':'';
  var colspans={'ch-body':5,'dl-body':4,'pr-body':10};
  Object.entries(colspans).forEach(function(e){
    var el=document.getElementById(e[0]);
    if(el)el.innerHTML='<tr><td colspan="'+e[1]+'"><div class="err-box"><b>'+msg+'</b>'+dh+'</div></td></tr>';
  });
}

// ── 메인 ─────────────────────────────────────────────────────────────────
async function init(){
  setStatus('spin','데이터 불러오는 중');
  var prodRows=[],saleRows=[];

  try{
    var promises=[fetchCSV(CSV_PROD)];
    if(CSV_SALE)promises.push(fetchCSV(CSV_SALE));
    var results=await Promise.all(promises);
    function clean(arr){
      return(arr||[]).filter(function(r){
        return r&&Object.values(r).some(function(v){return String(v||'').trim()!=='';});
      });
    }
    prodRows=clean(results[0]);
    saleRows=clean(results[1]);
  }catch(e){
    showErr('CSV 불러오기 실패 — 구글 시트 웹에 게시(CSV) 설정 확인',e.message);
    return;
  }

  if(!prodRows.length){showErr('출시상품데이터가 비어있습니다');return;}

  var pH=detectHeaders(prodRows);
  var sH=saleRows.length?detectHeaders(saleRows):{};
  // F12 콘솔 — 헤더 매핑 & 첫 행 샘플로 매핑 이상 여부 즉시 확인 가능
  console.log('[PROD헤더]',JSON.stringify(pH));
  console.log('[SALE헤더]',JSON.stringify(sH));
  if(saleRows.length)console.log('[SALE1행]',JSON.stringify(saleRows[0]));

  // ── 출시상품 처리 ─────────────────────────────────────────────────────
  var theme='';
  var codeMap={},gubuMap={};

  prodRows.forEach(function(r){
    try{
      // 코드: NFC 정규화 + 공백 완전 제거
      var code=String(g(r,pH,'code')||'').normalize('NFC').replace(/\s+/g,'');
      if(!code)return;
      if(!theme)theme=g(r,pH,'theme');

      var gubu=g(r,pH,'gubu')||g(r,pH,'name')||code;
      var otbOff =toI(g(r,pH,'otb_off'));
      var otbMall=toI(g(r,pH,'otb_mall'));
      var otbSmt =toI(g(r,pH,'otb_smt'));
      var otbRaw =toI(g(r,pH,'otb_all'));
      var otbAll =otbRaw>0?otbRaw:(otbOff+otbMall+otbSmt);

      codeMap[code]={gubu:gubu,otbOff:otbOff,otbMall:otbMall,otbSmt:otbSmt};

      if(!gubuMap[gubu])gubuMap[gubu]={
        name:gubu,otb:0,
        qtyOff:0,qtyMall:0,qtySmt:0,qtyKakao:0,qty29:0,
        salesOff:0,salesMall:0,salesSmt:0,salesKakao:0,sales29:0,
        _sales:0,
      };
      gubuMap[gubu].otb+=otbAll;
    }catch(e){console.warn('[PROD오류]',e.message,r);}
  });

  var titleText=theme||'신상품 매출 리포트';
  var ptEl=document.getElementById('page-title');if(ptEl)ptEl.textContent=titleText;
  document.title=titleText+' — Business Management';
  var ftEl=document.getElementById('footer-txt');if(ftEl)ftEl.textContent='Business Management · '+titleText;

  // ── 매출 처리 ─────────────────────────────────────────────────────────
  var byDate={};
  var byCh={
    '오프라인':{qty:0,sales:0},'통합몰':{qty:0,sales:0},
    '스마트스토어':{qty:0,sales:0},'카카오선물하기':{qty:0,sales:0},'29CM':{qty:0,sales:0},
  };

  saleRows.forEach(function(r){
    try{
      var date=toMMDD(g(r,sH,'date'));if(!date)return;
      var ch   =g(r,sH,'channel');
      // 코드: 출시상품과 동일한 방식으로 정규화
      var code =String(g(r,sH,'sale_code')||'').normalize('NFC').replace(/\s+/g,'');
      var qty  =toI(g(r,sH,'qty'));
      var sales=toN(g(r,sH,'sales'));

      // ★ Bug1 핵심 수정: codeMap 조회를 1순위로 — 가장 신뢰할 수 있는 조인 키
      // 이전 방식(sale_gubu 1순위)은 시트별 구분자 표기 불일치 시 key가 어긋나 OTB=0 발생
      var gubu='';
      if(code&&codeMap[code]){
        gubu=codeMap[code].gubu;      // ★ 1순위: 코드→product sheet 구분자(권위있는 키)
      }
      if(!gubu)gubu=g(r,sH,'sale_gubu'); // 2순위: 매출 시트 구분자 (코드 미매칭 시 폴백)
      if(!gubu)gubu=code||'기타';         // 최종: 코드 자체 or 기타

      var bkt=toBucket(ch);

      if(!byDate[date])byDate[date]={qty:0,sales:0};
      byDate[date].qty+=qty;byDate[date].sales+=sales;

      if(byCh[bkt]){byCh[bkt].qty+=qty;byCh[bkt].sales+=sales;}

      if(!gubuMap[gubu])gubuMap[gubu]={
        name:gubu,otb:0,
        qtyOff:0,qtyMall:0,qtySmt:0,qtyKakao:0,qty29:0,
        salesOff:0,salesMall:0,salesSmt:0,salesKakao:0,sales29:0,
        _sales:0,
      };
      if     (bkt==='오프라인')    {gubuMap[gubu].qtyOff  +=qty;gubuMap[gubu].salesOff  +=sales;}
      else if(bkt==='통합몰')      {gubuMap[gubu].qtyMall +=qty;gubuMap[gubu].salesMall +=sales;}
      else if(bkt==='스마트스토어'){gubuMap[gubu].qtySmt  +=qty;gubuMap[gubu].salesSmt  +=sales;}
      else if(bkt==='카카오선물하기'){gubuMap[gubu].qtyKakao+=qty;gubuMap[gubu].salesKakao+=sales;}
      else if(bkt==='29CM')        {gubuMap[gubu].qty29   +=qty;gubuMap[gubu].sales29   +=sales;}
      gubuMap[gubu]._sales+=sales;

    }catch(e){console.warn('[SALE오류]',e.message,r);}
  });

  // ★ Bug2: OTB 합산 — exact+fuzzy 탐색으로 감지된 컬럼 사용
  var otbMap={
    '오프라인':      prodRows.reduce(function(a,r){return a+toI(g(r,pH,'otb_off'));},0),
    '통합몰':        prodRows.reduce(function(a,r){return a+toI(g(r,pH,'otb_mall'));},0),
    '스마트스토어':  prodRows.reduce(function(a,r){return a+toI(g(r,pH,'otb_smt'));},0),
    '카카오선물하기': 0,
    '29CM':          0,
  };
  console.log('[PROD헤더OTB] off='+pH.otb_off+' mall='+pH.otb_mall+' smt='+pH.otb_smt);
  console.log('[OTB맵]',JSON.stringify(otbMap));

  // totalOtb: 채널별 합산 우선, 0이면 gubuMap에서 폴백
  var totalOtb=otbMap['오프라인']+otbMap['통합몰']+otbMap['스마트스토어'];
  if(totalOtb===0)totalOtb=Object.values(gubuMap).reduce(function(a,gd){return a+gd.otb;},0);

  var totalQty  =Object.values(byDate).reduce(function(a,d){return a+d.qty;},0);
  var totalSales=Object.values(byDate).reduce(function(a,d){return a+d.sales;},0);

  // ★ Bug3: activeChannels 1회 산출 → 두 렌더 함수에 공유
  var activeChannels=ALL_CH.filter(function(n){
    return (otbMap[n]||0)>0||(byCh[n]&&byCh[n].qty>0)||(byCh[n]&&byCh[n].sales>0);
  });
  if(!activeChannels.length)activeChannels=ALL_CH.slice();

  renderKPI(totalOtb,totalQty,totalSales);
  renderChannel(byCh,otbMap,activeChannels);
  renderDaily(byDate,totalOtb);
  renderProducts(gubuMap,activeChannels);

  var now=new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  setStatus('ok','마지막 업데이트: '+now+' · 제품 '+prodRows.length+'행 · 매출 '+saleRows.length+'행');
}

init();

</script>
